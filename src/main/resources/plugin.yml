name: SkyCity
version: 1.0-SNAPSHOT
main: de.mcbesser.skycity.SkyCityPlugin
api-version: "26.1.1"
load: STARTUP
author: Codex
softdepend: [PlaceholderAPI, Vault]
commands:
  spawn:
    description: Teleportiert zum Spawn
  is:
    description: Inselmen\u00fc und Inselbefehle
    aliases: [island]
  warp:
    description: Teleportiert zu einem Inselwarp
  accept:
    description: Best\u00e4tigt eine Aktion
  cancel:
    description: Bricht eine Aktion ab
  ignore:
    description: Ignoriert einen Spieler
permissions:
  skycity.admin:
    default: op
